; TallieLight custom additions — appended to platformio_override.ini at CI build time.
; GITHUB_WORKSPACE is substituted by the workflow before appending.

[env:tasmota32_base]
custom_berry_solidify =
    GITHUB_WORKSPACE_PLACEHOLDER/src/oa_service.be
    GITHUB_WORKSPACE_PLACEHOLDER/src/tl_scoreboard_event.be
    GITHUB_WORKSPACE_PLACEHOLDER/src/tl_config.be
    GITHUB_WORKSPACE_PLACEHOLDER/src/tl_saved_light.be
    GITHUB_WORKSPACE_PLACEHOLDER/src/tl_run_state.be
    GITHUB_WORKSPACE_PLACEHOLDER/src/tl_light_controller.be
    GITHUB_WORKSPACE_PLACEHOLDER/src/tl_service.be
custom_files_upload = GITHUB_WORKSPACE_PLACEHOLDER/littlefs-staging/.extensions
