<div class=tch>

<div class=tct></div>
<div class=tcc>
<button type=button class=tcb data-act=up title="Move Up">↑</button>
<button type=button class=tcb data-act=down title="Move Down">↓</button>
</div>
</div>
<div>

</div>
</div>

</div>

</div>
</div>

</div>

</div>
</div>
</div>
</div>
</template>
<div id=account-section>
<fieldset><legend><b>Account</b></legend>
<div id=account-info-slot>
<p id=account-email-row data-show="authed expired-refresh expired-reauth"><b>Email:</b> <span id=account-email></span>

</div>

<p><a id=login-verification-url href=# target=_blank style=word-break:break-all></a>

</div>

<div data-show=authed>
<div id=account-info-authed-slot></div>
<p style=color:var(--c_tab);font-size:.9em;margin-top:2px;margin-bottom:12px><span id=account-token-expiry></span></p>

<input type=hidden name=oa-action value=clear_all><button class=button>Log Out</button>
</form>
</div>
<p data-show=unauthed style=padding-left:5px;margin-bottom:10px>Log in to configure teams</p>
<div id=account-error class=ec><b>Error:</b> <span id=account-error-message></span></div>
<div id=account-actions>

<input type=hidden name=oa-action value=initiate><button>Log In</button>
</form>
<form action=/tl method=post class=oab style=margin-right:10px data-show=pending>
<input type=hidden name=oa-action value=complete><button>Continue</button>
</form>
<form action=/tl method=post class=oab style=margin-right:10px data-show=pending>
<input type=hidden name=oa-action value=clear_pending><button>Cancel</button>
</form>
<form action=/tl method=post class=oab style=margin-right:10px data-show=expired-refresh>
<input type=hidden name=oa-action value=refresh><button>Reconnect</button>
</form>
<form action=/tl method=post class=oab style=margin-right:10px data-show="expired-refresh expired-reauth">
<input type=hidden name=oa-action value=clear_all><button class=button>Log Out</button>
</form>
</div>
</fieldset>
</div>
<form id=config-form action=/tl method=post>
<input type=hidden name=update-config value=true>
<input type=hidden name=team-configs id=hf-tc>
<input type=hidden name=light-restore id=hf-lr>

<div id=team-cards style="margin:0 5px"></div>

</fieldset>
</div>
<div id=system-section>
<fieldset><legend><b>Settings</b></legend>
<div class=st>
<div class=srow><span class=sl>Light Restore Time</span><span class=si>

</span></div>

<input type=checkbox id=turn-on-light>
</span></div>
</div>
</fieldset>
<button name=apply-btn class="button bgrn" style=margin-top:20px>Save</button>
</div>
</form>
