name: Build Release

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version component to bump (ignored if version is set)"
        required: false
        type: choice
        default: patch
        options: [major, minor, patch]
      version:
        description: "Explicit version override (e.g. 1.3.0) — takes precedence over bump"
        required: false
        type: string

jobs:
  compute-version:
    runs-on: ubuntu-latest
    outputs:
      semver: ${{ steps.resolve.outputs.semver }}
      hex_version: ${{ steps.resolve.outputs.hex_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Compute bumped version
        id: resolve
        run: |
          manifest_hex=$(grep -o '"version"[[:space:]]*:[[:space:]]*"[^"]*"' manifest.json \
            | sed 's/.*"\(0x[^"]*\)"/\1/')
          if [[ ! "$manifest_hex" =~ ^0x([0-9A-Fa-f]{2})([0-9A-Fa-f]{2})([0-9A-Fa-f]{2})([0-9A-Fa-f]{2})$ ]]; then
            echo "::error::manifest.json version must be 0xAABBCCDD"
            exit 1
          fi

          major=$((16#${BASH_REMATCH[1]}))
          minor=$((16#${BASH_REMATCH[2]}))
          patch=$((16#${BASH_REMATCH[3]}))

          if [[ -n "${{ inputs.version }}" ]]; then
            ver="${{ inputs.version }}"
            # Strip leading v if present
            ver="${ver#v}"
            if [[ ! "$ver" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
              echo "::error::version input must be A.B.C (e.g. 1.3.0)"
              exit 1
            fi
            major="${BASH_REMATCH[1]}"
            minor="${BASH_REMATCH[2]}"
            patch="${BASH_REMATCH[3]}"
          else
            case "${{ inputs.bump }}" in
              major) major=$((major + 1)); minor=0; patch=0 ;;
              minor) minor=$((minor + 1)); patch=0 ;;
              patch) patch=$((patch + 1)) ;;
            esac
          fi

          for v in $major $minor $patch; do
            if [[ $v -gt 255 ]]; then
              echo "::error::Version component overflow (max 255 per component)"
              exit 1
            fi
          done

          hex_version=$(printf "0x%02X%02X%02X%02X" "$major" "$minor" "$patch" "0")
          semver="v${major}.${minor}.${patch}.0"

          echo "semver=${semver}"           >> "$GITHUB_OUTPUT"
          echo "hex_version=${hex_version}" >> "$GITHUB_OUTPUT"
          echo "New version: ${semver} (${hex_version})"

  build-tapp:
    needs: compute-version
    uses: ./.github/workflows/build-tapp-reusable.yml
    with:
      hex_version: ${{ needs.compute-version.outputs.hex_version }}
    secrets: inherit

  build-tasmota:
    needs: [compute-version, build-tapp]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: [dev, prod]
    steps:
      - name: Checkout (with Tasmota submodule)
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Patch version fields
        run: |
          hex_version="${{ needs.compute-version.outputs.hex_version }}"
          sed -i'' -E "s/static VERSION[[:space:]]*=[[:space:]]*0x[0-9A-Fa-f]*/static VERSION = $hex_version/" src/oa_service.be
          sed -i'' -E "s/static VERSION[[:space:]]*=[[:space:]]*0x[0-9A-Fa-f]*/static VERSION = $hex_version/" src/tl_service.be

      - name: Download tapp artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.environment == 'prod' && 'TallieLight.tapp' || 'TallieLight-dev.tapp' }}
          path: littlefs-staging/.extensions/

      - name: Cache PlatformIO packages
        uses: actions/cache@v5
        with:
          path: ~/.platformio
          key: platformio-${{ runner.os }}-${{ hashFiles('tasmota-upstream/platformio.ini') }}
          restore-keys: platformio-${{ runner.os }}-

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install pioarduino
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "latest"
          enable-cache: true
      - run: uv pip install --system pioarduino littlefs-python

      - name: Copy user_config_override.h
        run: |
          if [ ! -d tasmota-upstream/tasmota ]; then
            echo "::error::Expected Tasmota source directory at tasmota-upstream/tasmota"
            exit 1
          fi
          cp tasmota-config/user_config_override.h tasmota-upstream/tasmota/user_config_override.h

      - name: Generate platformio_override.ini
        working-directory: tasmota-upstream
        run: |
          cp platformio_override_sample.ini platformio_override.ini
          sed -i 's/^                          tasmota$/                          tasmota32/' platformio_override.ini
          python3 - <<'PYEOF'
          import os, re

          ws = os.environ["GITHUB_WORKSPACE"]
          append_file = os.path.join(ws, "tasmota-config", "platformio_append.ini")
          override_file = "platformio_override.ini"

          with open(append_file) as f:
              snippet = f.read().replace("GITHUB_WORKSPACE_PLACEHOLDER", ws)

          snippet = re.sub(r"^\[env:tasmota32_base\]\n", "", snippet, flags=re.MULTILINE)

          with open(override_file) as f:
              content = f.read()

          content = content.replace("[env:tasmota32_base]\n", "[env:tasmota32_base]\n" + snippet, 1)

          with open(override_file, "w") as f:
              f.write(content)
          PYEOF

      - name: Build Tasmota firmware
        working-directory: tasmota-upstream
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUTF8: "1"
        run: platformio run -e tasmota32

      - name: Rename firmware binaries
        run: |
          prefix=${{ matrix.environment == 'prod' && '"tl-"' || '"tl-dev-"' }}
          mv "tasmota-upstream/build_output/firmware/tasmota32.bin" \
             "tasmota-upstream/build_output/firmware/${prefix}tasmota32.bin"
          mv "tasmota-upstream/build_output/firmware/tasmota32.factory.bin" \
             "tasmota-upstream/build_output/firmware/${prefix}tasmota32.factory.bin"

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.environment == 'prod' && 'tl-tasmota32.bin' || 'tl-dev-tasmota32.bin' }}
          path: tasmota-upstream/build_output/firmware/${{ matrix.environment == 'prod' && 'tl-tasmota32.bin' || 'tl-dev-tasmota32.bin' }}
          if-no-files-found: error

      - name: Upload factory firmware artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.environment == 'prod' && 'tl-tasmota32.factory.bin' || 'tl-dev-tasmota32.factory.bin' }}
          path: tasmota-upstream/build_output/firmware/${{ matrix.environment == 'prod' && 'tl-tasmota32.factory.bin' || 'tl-dev-tasmota32.factory.bin' }}
          if-no-files-found: error

  release:
    needs: [compute-version, build-tapp, build-tasmota]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist/

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # ── gh-pages deployment ──────────────────────────────────────────────

      - name: Checkout gh-pages branch
        run: |
          if git ls-remote --exit-code origin gh-pages; then
            git fetch origin gh-pages
            git worktree add gh-pages-dir gh-pages
          else
            git worktree add --orphan -b gh-pages gh-pages-dir
          fi

      - name: Populate gh-pages
        run: |
          semver="${{ needs.compute-version.outputs.semver }}"
          hex_version="${{ needs.compute-version.outputs.hex_version }}"
          cd gh-pages-dir

          # Wipe everything except CNAME and .git internals
          find . -mindepth 1 -not -name 'CNAME' -not -path './.git*' -delete

          echo "ota.tallielight.com" > CNAME

          # Firmware OTA binaries at root
          cp "$GITHUB_WORKSPACE/dist/tl-tasmota32.bin/tl-tasmota32.bin"         ./tl-tasmota32.bin
          cp "$GITHUB_WORKSPACE/dist/tl-dev-tasmota32.bin/tl-dev-tasmota32.bin" ./tl-dev-tasmota32.bin

          # Prod extension index + tapp
          mkdir -p extensions/tapp
          cp "$GITHUB_WORKSPACE/dist/TallieLight.tapp/TallieLight.tapp" extensions/tapp/TallieLight.tapp
          printf '{"name":"Tallie Light","file":"TallieLight.tapp","version":"%s","description":"Sports score-based light control.","author":"Allen Schober"}\n' \
            "$hex_version" > extensions/extensions.jsonl

          # Dev extension index + tapp
          mkdir -p extensions/dev/tapp
          cp "$GITHUB_WORKSPACE/dist/TallieLight-dev.tapp/TallieLight-dev.tapp" extensions/dev/tapp/TallieLight-dev.tapp
          printf '{"name":"Tallie Light (Dev)","file":"TallieLight-dev.tapp","version":"%s","description":"Sports score-based light control.","author":"Allen Schober"}\n' \
            "$hex_version" > extensions/dev/extensions.jsonl

          # Future flashing page (copy install/ from main if present)
          if [ -d "$GITHUB_WORKSPACE/docs/install" ]; then
            cp -r "$GITHUB_WORKSPACE/docs/install" ./install
          fi

          git add -A
          git commit -m "release: ${semver}"
          git push --force origin gh-pages

      # ── Version bump + tag on main ───────────────────────────────────────

      - name: Bump version on main
        run: |
          semver="${{ needs.compute-version.outputs.semver }}"
          hex_version="${{ needs.compute-version.outputs.hex_version }}"

          sed -i'' -E "s/\"version\"[[:space:]]*:[[:space:]]*\"[^\"]*\"/\"version\": \"${hex_version}\"/" manifest.json
          sed -i'' -E "s/static VERSION[[:space:]]*=[[:space:]]*0x[0-9A-Fa-f]*/static VERSION = ${hex_version}/" src/oa_service.be
          sed -i'' -E "s/static VERSION[[:space:]]*=[[:space:]]*0x[0-9A-Fa-f]*/static VERSION = ${hex_version}/" src/tl_service.be

          git add manifest.json src/oa_service.be src/tl_service.be
          git commit -m "chore: bump version to ${semver}"
          git tag "${semver}"
          git push origin main
          git push origin "${semver}"

      # ── GitHub Release ───────────────────────────────────────────────────

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.compute-version.outputs.semver }}
          name: ${{ needs.compute-version.outputs.semver }}
          files: |
            dist/TallieLight.tapp/TallieLight.tapp
            dist/TallieLight-dev.tapp/TallieLight-dev.tapp
            dist/tl-tasmota32.bin/tl-tasmota32.bin
            dist/tl-dev-tasmota32.bin/tl-dev-tasmota32.bin
            dist/tl-tasmota32.factory.bin/tl-tasmota32.factory.bin
            dist/tl-dev-tasmota32.factory.bin/tl-dev-tasmota32.factory.bin
